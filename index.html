<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap');
        .font-romantic { font-family: 'Dancing+Script', cursive; }
        body { background-color: #050505; color: white; overflow-x: hidden; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="setup" class="text-center animate-bounce">
        <button onclick="startSurprise()" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 px-8 rounded-full shadow-lg transition-all transform hover:scale-110">
            Click for a Surprise! 🎁
        </button>
    </div>

    <div id="main-content" class="hidden text-center space-y-6">
        <h1 class="text-6xl font-romantic text-pink-500 animate-pulse">Happy Birthday! ❤️</h1>
        <p class="text-xl text-gray-300 max-w-md mx-auto">
            Wishing you a day filled with love, laughter, and everything your heart desires. 
            You make every moment special! ✨
        </p>
        
        <div class="relative inline-block mt-8">
            <div class="absolute -inset-1 bg-gradient-to-r from-pink-600 to-purple-600 rounded-lg blur opacity-75"></div>
            <img src="https://via.placeholder.com/300" alt="Birthday Image" class="relative rounded-lg w-64 h-64 object-cover">
        </div>

        <div class="mt-8">
            <p class="text-pink-400 font-semibold italic">"You’re not just a year older, but a year better."</p>
        </div>
    </div>

    <script>
        function startSurprise() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // Confetti Blast
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
